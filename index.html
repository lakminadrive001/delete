<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My YT Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        input {
            width: 70%;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 20px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .video-container {
            margin-top: 20px;
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid #333;
        }
    </style>
</head>
<body>

    <h2>YouTube Player</h2>
    <div class="container">
        <input type="text" id="videoUrl" placeholder="YouTube Link eka methana paste karanna...">
        <button onclick="playVideo()">Play</button>
        
        <div class="video-container" id="player">
            </div>
    </div>

    <script>
        function playVideo() {
            let url = document.getElementById('videoUrl').value;
            let videoId = "";

            // URL eken Video ID eka ganna widiya
            if (url.includes("v=")) {
                videoId = url.split("v=")[1].split("&")[0];
            } else if (url.includes("youtu.be/")) {
                videoId = url.split("youtu.be/")[1];
            }

            if (videoId) {
                document.getElementById('player').innerHTML = 
                    `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
            } else {
                alert("Karunaakara niwaradi YouTube link ekak labadiila play karanna.");
            }
        }
    </script>

</body>
</html>
