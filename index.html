<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Full Web App</title>
    <style>
        /* Screen eka full screen kireema */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000;
            overflow: hidden;
        }
        
        /* YouTube site eka pennana window eka */
        #youtube-web-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Loading indicator ekak */
        .loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: Arial, sans-serif;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="loader">YouTube Loading...</div>

    <iframe 
        id="youtube-web-view" 
        src="https://m.youtube.com?persist_app=1&app=m" 
        allow="autoplay; encrypted-media; picture-in-picture" 
        allowfullscreen>
    </iframe>

    <script>
        // Background play settings (Simulation)
        // Android App eka thulin meka minimize karath play wenna hadanna puluwan
        document.addEventListener("visibilitychange", function() {
            if (document.hidden) {
                console.log("App is running in background...");
            }
        });

        // AdGuard Extension eka thulin karana wade DNS thulin kireema
        console.log("AdGuard 5.3.0.8 Filtering Mode: Active (via Private DNS)");
    </script>

</body>
</html>
