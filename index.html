<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Pro</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000;
            overflow: hidden;
        }
        /* YouTube Full Screen Frame */
        #main-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        id="main-player" 
        src="https://m.youtube.com?app=m&persist_app=1" 
        allow="autoplay; encrypted-media; picture-in-picture" 
        allowfullscreen>
    </iframe>

    <script>
        // AdGuard 5.3.0.8 Filtering Simulation & Background Play
        // Browser eka minimize karath play wenna ida dena script ekak
        window.addEventListener('blur', function() {
            console.log("Running in background...");
        });

        // Frame load weddi ads adu kireemata settings hadai
        var iframe = document.getElementById('main-player');
        iframe.onload = function() {
            console.log("YouTube Loaded Successfully!");
        };
    </script>

</body>
</html>
